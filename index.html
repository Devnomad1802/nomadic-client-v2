<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nt.png" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Editorial blog fonts: Playfair Display (headings) + Newsreader (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
    <title>Curated Travel Experiences, Community Trips &amp; Retreats | Nomadic Townies</title>

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="Discover community trips, backpacking adventures, wellness retreats, workshops, and cultural immersions hosted by passionate communities. Nomadic Townies is a curated marketplace for transformative travel experiences." />
    <meta name="keywords" content="curated travel experiences, community trips, backpacking adventures, wellness retreats, cultural immersions, travel workshops, host-led experiences, meaningful travel, Nomadic Townies" />
    <meta name="author" content="Nomadic Townies" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nomadictownies.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nomadictownies.com/" />
    <meta property="og:site_name" content="Nomadic Townies" />
    <meta property="og:title" content="Nomadic Townies | Curated Travel Experiences &amp; Community Trips" />
    <meta property="og:description" content="Explore meaningful travel experiences hosted by passionate communities — from backpacking adventures and retreats to workshops and cultural immersions." />
    <meta property="og:image" content="https://nomadic-townies-assets.sgp1.cdn.digitaloceanspaces.com/about-images/aboutbg1.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://nomadictownies.com/" />
    <meta name="twitter:title" content="Nomadic Townies | Curated Travel Experiences" />
    <meta name="twitter:description" content="Discover host-led community trips, retreats, workshops, and cultural immersions through Nomadic Townies." />
    <meta name="twitter:image" content="https://nomadic-townies-assets.sgp1.cdn.digitaloceanspaces.com/about-images/aboutbg1.jpg" />

    <!-- Structured Data: Organization + WebSite (no fabricated stats/ratings) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Nomadic Townies",
            "url": "https://nomadictownies.com/",
            "logo": "https://nomadictownies.com/nt.png",
            "description": "A curated marketplace for host-led travel experiences — community trips, retreats, workshops and cultural immersions.",
            "sameAs": [
              "https://www.instagram.com/nomadictownies",
              "https://www.facebook.com/nomadictownies"
            ]
          },
          {
            "@type": "WebSite",
            "name": "Nomadic Townies",
            "url": "https://nomadictownies.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://nomadictownies.com/experiences?search={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>

    <!-- Geo Tags -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.country" content="India" />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#EC3F18" />

    </script>
